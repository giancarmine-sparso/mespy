[project]
name = "mech-lab-tools"
version = "0.1.0"
description = "Toolbox Python per l'analisi dati del laboratorio di meccanica"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "scipy",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ipykernel",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"
